<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Access Required - Quartz Site</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .login-container {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        
        .logo {
            font-size: 2rem;
            font-weight: bold;
            color: #333;
            margin-bottom: 0.5rem;
        }
        
        .subtitle {
            color: #666;
            margin-bottom: 2rem;
        }
        
        .form-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }
        
        label {
            display: block;
            margin-bottom: 0.5rem;
            color: #333;
            font-weight: 500;
        }
        
        input[type="password"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #e1e5e9;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        input[type="password"]:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .login-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        
        .error {
            color: #e74c3c;
            margin-top: 1rem;
            font-size: 14px;
        }
        
        .success {
            color: #27ae60;
            margin-top: 1rem;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">🔒 Quartz Access</div>
        <div class="subtitle">Enter password to access the knowledge base</div>
        
        <form id="loginForm">
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>
            <button type="submit" class="login-btn">Access Site</button>
        </form>
        
        <div id="message"></div>
    </div>

    <script>
        // Configuration
        const CORRECT_PASSWORD = 'myQuartzPassword123'; // Ganti dengan password Anda
        const MAIN_SITE_URL = './index.html'; // Atau URL ke halaman utama Quartz
        const SESSION_KEY = 'quartzAuthenticated';
        const SESSION_DURATION = 24 * 60 * 60 * 1000; // 24 jam dalam milliseconds
        
        // Check if user is already authenticated
        function checkExistingAuth() {
            const authData = localStorage.getItem(SESSION_KEY);
            if (authData) {
                const { timestamp } = JSON.parse(authData);
                const now = new Date().getTime();
                
                // Check if session is still valid
                if (now - timestamp < SESSION_DURATION) {
                    // Redirect to main site
                    window.location.href = MAIN_SITE_URL;
                    return true;
                } else {
                    // Session expired, remove it
                    localStorage.removeItem(SESSION_KEY);
                }
            }
            return false;
        }
        
        // Handle form submission
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const password = document.getElementById('password').value;
            const messageDiv = document.getElementById('message');
            
            if (password === CORRECT_PASSWORD) {
                // Store authentication with timestamp
                const authData = {
                    authenticated: true,
                    timestamp: new Date().getTime()
                };
                localStorage.setItem(SESSION_KEY, JSON.stringify(authData));
                
                messageDiv.innerHTML = '<div class="success">✓ Access granted! Redirecting...</div>';
                
                // Redirect after short delay
                setTimeout(() => {
                    window.location.href = MAIN_SITE_URL;
                }, 1000);
                
            } else {
                messageDiv.innerHTML = '<div class="error">✗ Incorrect password. Please try again.</div>';
                document.getElementById('password').value = '';
                document.getElementById('password').focus();
            }
        });
        
        // Check authentication on page load
        document.addEventListener('DOMContentLoaded', function() {
            if (!checkExistingAuth()) {
                document.getElementById('password').focus();
            }
        });
        
        // Optional: Add logout function that can be called from main site
        function quartzLogout() {
            localStorage.removeItem(SESSION_KEY);
            window.location.href = './login.html'; // Atau nama file login page
        }
        
        // Make logout function globally available
        window.quartzLogout = quartzLogout;
    </script>
</body>
</html>
